<!DOCTYPE html>

<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<title>Teleprompter</title>
	
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
	
	<link rel="stylesheet" href="css/base.css">
	<link rel="stylesheet" href="css/setup.css">
	<link rel="stylesheet" href="css/prompter.css">
</head>

<body>

<!-- SETUP -->
<div id="setup">
	<h1>
		<span>Voice Commanded Teleprompter</span>
		Paste your text
	</h1>

	<textarea id="textInput" placeholder="Type or paste the text you want to read...&#10;&#10;The teleprompter will listen and scroll automatically."></textarea>

	<div class="setup-controls">
		<div class="slider-row">
			<label for="micSelect">Microphone</label>
			<select id="micSelect" class="lang-select"></select>
			<button type="button" id="micUnlockBtn" class="inline-btn" title="Grant microphone permission to reveal device names">Unlock names</button>
		</div>
		<div class="slider-row mic-meter-row" id="micMeterRow" hidden>
			<label aria-hidden="true">Level</label>
			<div class="mic-meter" role="meter" aria-label="Microphone input level" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
				<div class="mic-meter-fill" id="micMeterFill"></div>
			</div>
		</div>
		<div class="slider-row">
			<label for="gainSlider">Mic gain</label>
			<input type="range" id="gainSlider" min="0" max="500" value="100">
			<span class="slider-val" id="gainVal" aria-hidden="true">100%</span>
		</div>
		<div class="slider-row">
			<label for="languageSelect">Language</label>
			<select id="languageSelect" class="lang-select">
				<option value="english">English</option>
				<option value="spanish">Español</option>
				<option value="french">Français</option>
				<option value="german">Deutsch</option>
				<option value="italian">Italiano</option>
				<option value="portuguese">Português</option>
				<option value="dutch">Nederlands</option>
				<option value="russian">Русский</option>
				<option value="chinese">中文</option>
				<option value="japanese">日本語</option>
				<option value="korean">한국어</option>
				<option value="arabic">العربية</option>
			</select>
		</div>
		<div class="slider-row">
			<label for="fontSizeSlider">Font size</label>
			<input type="range" id="fontSizeSlider" min="24" max="96" value="30">
			<span class="slider-val" id="fontSizeVal" aria-hidden="true">30px</span>
		</div>
		<div class="slider-row">
			<label for="widthSlider">Text width</label>
			<input type="range" id="widthSlider" min="15" max="100" value="16">
			<span class="slider-val" id="widthVal" aria-hidden="true">16%</span>
		</div>
	</div>

	<button id="startBtn">▶ &nbsp; Start teleprompter</button>
</div>

<!-- LOADING -->
<div id="loadingOverlay">
	<div class="spinner"></div>
	<p id="loadingMsg">Loading Whisper model...</p>
</div>

<!-- PROMPTER -->
<div id="prompter">
	<div id="guide"></div>
	<div class="fade-top"></div>
	<div class="fade-bottom"></div>

	<div id="scrollContainer">
		<div id="textPad">
			<div id="promptText"></div>
		</div>
	</div>

	<div id="panel" role="toolbar" aria-label="Teleprompter controls">
		<div id="statusDot" role="status" aria-label="Microphone status"></div>
		<button class="panel-btn" id="micBtn" aria-label="Start or pause microphone" aria-keyshortcuts="Space">🎙</button>
		<div class="divider" aria-hidden="true"></div>
		<div class="panel-slider-wrap">
			<span class="panel-label" aria-hidden="true">Aa</span>
			<input type="range" class="panel-range" id="panelFontSlider" min="24" max="96" value="30" aria-label="Font size">
		</div>
		<div class="panel-slider-wrap">
			<span class="panel-label" aria-hidden="true">↔</span>
			<input type="range" class="panel-range" id="panelWidthSlider" min="15" max="100" value="16" aria-label="Text width">
		</div>
		<div class="panel-slider-wrap">
			<span class="panel-label" aria-hidden="true">🎚</span>
			<input type="range" class="panel-range" id="panelGainSlider" min="0" max="500" value="100" aria-label="Microphone gain">
		</div>
		<div class="divider" aria-hidden="true"></div>
		<button class="panel-btn" id="resetBtn" aria-label="Reset to beginning">↺</button>
		<button class="panel-btn" id="exitBtn" aria-label="Exit teleprompter">✕</button>
	</div>

	<button id="hideHint" aria-keyshortcuts="H">Hide panel [H]</button>
	<div id="transcript" aria-hidden="true"></div>
</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
